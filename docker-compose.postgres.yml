
services:
  postgres:
    image: postgres:16
    container_name: campuscode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campuscode
    ports:
      - "5433:5432"
    volumes:
      - campuscode_pg_data:/var/lib/postgresql/data

volumes:
  campuscode_pg_data:

