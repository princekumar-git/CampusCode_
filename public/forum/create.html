<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Discussion - CampusCode</title>
  <link rel="shortcut icon" href="/campuscode-logo.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { sans: ["Poppins", "sans-serif"] },
          colors: {
            primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440" },
            dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #7ba4d0; border-radius: 3px; }
    
    /* Sidebar Styles matching Dashboard & Forum EXACTLY */
    .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
    .sidebar-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .sidebar-brand-logo { width: 2.25rem; height: 2.25rem; object-fit: contain; flex-shrink: 0; }
    .nav-item {
        transition: all 0.2s ease;
        position: relative;
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        margin-bottom: 0.25rem;
        color: #374151;
        border-radius: 0.5rem;
        cursor: pointer;
        white-space: nowrap;
    }
    .nav-item:hover { background-color: #f3f4f6; }
    .dark .nav-item { color: #d1d5db; }
    .dark .nav-item:hover { background-color: #374151; }
    .nav-item.active { background-color: #d0e1f5; color: #1e4a7a; font-weight: 600; }
    .dark .nav-item.active { background-color: #1e4a7a; color: #ffffff; }
    .nav-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        height: 60%;
        width: 4px;
        background-color: #2e5e99;
        border-radius: 0 4px 4px 0;
    }
    .dark .nav-item.active::before { background-color: #60a5fa; }
    .nav-item i { width: 1.5rem; text-align: center; margin-right: 0.75rem; font-size: 1.1rem; flex-shrink: 0; }
    .nav-item span { font-size: 0.875rem; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans transition-colors duration-200">
  <div id="appShell" class="flex h-screen overflow-hidden">
    
    <aside id="mainSidebar" class="sidebar w-64 bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 flex flex-col h-screen flex-shrink-0 transition-colors duration-200 z-50">
        <div class="p-6 flex-shrink-0 flex items-center justify-between h-[88px]">
            <div class="sidebar-brand text-2xl font-bold text-gray-800 dark:text-white overflow-hidden whitespace-nowrap">
                <img src="/campuscode-logo.jpeg" alt="CampusCode logo" class="sidebar-brand-logo rounded-md shadow-sm">
                <span class="transition-all duration-300 opacity-100 w-auto">CampusCode<span class="text-primary-400 dark:text-primary-200 text-xs align-top ml-0.5">SA</span></span>
            </div>
        </div>

        <nav id="roleSidebarNav" class="flex-1 px-4 space-y-1 overflow-y-auto mt-2">
            <!-- Populated by forum.js dynamically based on user role -->
        </nav>

        <div class="p-4 space-y-1 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 bottom-menu">
            <a href="/auth/logout" class="nav-item text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>
            <div class="w-full text-left flex items-center gap-3 p-3 rounded-xl bg-gray-50 dark:bg-gray-700 mt-2 border border-gray-100 dark:border-gray-600">
                <div id="sidebarAvatar" class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white font-bold text-sm shadow-inner">
                    SA
                </div>
                <div class="min-w-0">
                    <div id="sidebarName" class="text-sm font-bold text-gray-800 dark:text-white truncate leading-tight">Superadmin</div>
                    <div id="sidebarRole" class="text-[10px] text-primary-500 dark:text-primary-200 font-semibold uppercase tracking-wider">SuperAdmin</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 overflow-y-auto w-full">
      
      <header class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-200 sticky top-0 z-40 border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
          
          <div class="flex items-center gap-4">
            <a href="/forum/forum.html" class="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-600">
              <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
              <h1 class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">Create Discussion</h1>
              <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-0.5">Start a new thread in the community forum.</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600">
              <i id="theme-toggle-dark-icon" class="fa-solid fa-moon dark:hidden text-lg"></i>
              <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden dark:block text-lg"></i>
            </button>
            <div class="relative">
              <button class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 relative">
                <i class="fa-solid fa-bell text-lg"></i>
                <span class="absolute top-0 right-0 h-2 w-2 rounded-full bg-red-500 border-2 border-white dark:border-gray-800"></span>
              </button>
            </div>
          </div>

        </div>
      </header>

      <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-gray-800 dark:text-gray-100">
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors duration-200">
            <div class="px-6 py-5 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50">
                <h3 class="text-lg font-semibold text-gray-800 dark:text-white flex items-center">
                    <span class="w-2 h-6 bg-primary-400 rounded-full mr-3"></span>Thread Details
                </h3>
            </div>
            
            <div class="p-6">
                <form id="createThreadForm" class="space-y-6">
                    
                    <div>
                        <label for="title" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Thread Title <span class="text-red-500">*</span></label>
                        <input type="text" id="title" required placeholder="Give your discussion a descriptive title..." 
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Topic Category <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="topic" value="general" class="peer sr-only" checked>
                                <div class="p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-center peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:border-primary-400 dark:peer-checked:bg-primary-900/20 group-hover:border-primary-300 dark:group-hover:border-primary-600 transition-all">
                                    <i class="fa-solid fa-comments text-xl mb-2 text-primary-500 dark:text-primary-400"></i>
                                    <div class="font-bold text-sm text-gray-800 dark:text-gray-200">General</div>
                                </div>
                            </label>
                            
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="topic" value="algo" class="peer sr-only">
                                <div class="p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-center peer-checked:border-yellow-500 peer-checked:bg-yellow-50 dark:peer-checked:border-yellow-500 dark:peer-checked:bg-yellow-900/20 group-hover:border-yellow-300 dark:group-hover:border-yellow-600 transition-all">
                                    <i class="fa-solid fa-brain text-xl mb-2 text-yellow-500"></i>
                                    <div class="font-bold text-sm text-gray-800 dark:text-gray-200">Algorithms</div>
                                </div>
                            </label>
                            
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="topic" value="web" class="peer sr-only">
                                <div class="p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:border-blue-500 dark:peer-checked:bg-blue-900/20 group-hover:border-blue-300 dark:group-hover:border-blue-600 transition-all">
                                    <i class="fa-solid fa-code text-xl mb-2 text-blue-500"></i>
                                    <div class="font-bold text-sm text-gray-800 dark:text-gray-200">Web Dev</div>
                                </div>
                            </label>

                            <label class="cursor-pointer relative group">
                                <input type="radio" name="topic" value="backend" class="peer sr-only">
                                <div class="p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-center peer-checked:border-green-500 peer-checked:bg-green-50 dark:peer-checked:border-green-500 dark:peer-checked:bg-green-900/20 group-hover:border-green-300 dark:group-hover:border-green-600 transition-all">
                                    <i class="fa-solid fa-server text-xl mb-2 text-green-500"></i>
                                    <div class="font-bold text-sm text-gray-800 dark:text-gray-200">Backend</div>
                                </div>
                            </label>

                        </div>
                    </div>

                    <div>
                        <label for="content" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Message Content <span class="text-red-500">*</span></label>
                        <div class="border border-gray-300 dark:border-gray-600 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary-400 focus-within:border-transparent transition-all">
                            <div class="bg-gray-50 dark:bg-gray-700/80 px-4 py-2 border-b border-gray-300 dark:border-gray-600 flex gap-3 text-gray-500 dark:text-gray-400">
                                <button type="button" class="hover:text-primary-500 dark:hover:text-primary-400 transition" title="Bold"><i class="fas fa-bold"></i></button>
                                <button type="button" class="hover:text-primary-500 dark:hover:text-primary-400 transition" title="Italic"><i class="fas fa-italic"></i></button>
                                <div class="w-px h-5 bg-gray-300 dark:bg-gray-600 mx-1 self-center"></div>
                                <button type="button" class="hover:text-primary-500 dark:hover:text-primary-400 transition" title="Link"><i class="fas fa-link"></i></button>
                                <button type="button" class="hover:text-primary-500 dark:hover:text-primary-400 transition" title="Code snippet"><i class="fas fa-code"></i></button>
                                <button type="button" class="hover:text-primary-500 dark:hover:text-primary-400 transition" title="List"><i class="fas fa-list-ul"></i></button>
                            </div>
                            <textarea id="content" rows="10" required placeholder="Describe your issue, share your solution, or ask a question. Markdown is supported..." 
                                class="w-full px-4 py-3 bg-white dark:bg-gray-700 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 outline-none resize-y border-0 focus:ring-0"></textarea>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-100 dark:border-gray-700 flex flex-col-reverse sm:flex-row justify-end gap-3 mt-8">
                        <a href="/forum/forum.html" class="px-6 py-2.5 rounded-xl text-center text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            Cancel
                        </a>
                        <button type="submit" id="submitBtn" class="px-6 py-2.5 rounded-xl text-sm font-semibold bg-primary-500 text-white hover:bg-primary-600 shadow-sm transition-all flex justify-center items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Post Discussion
                        </button>
                    </div>

                </form>
            </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/js/forum.js"></script>
</body>
</html>
